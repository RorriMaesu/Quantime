name: Compile & Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Inno Setup
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/jrsoftware/issrc/releases/download/is-6_3_3/innosetup-6.3.3.exe" -OutFile "innosetup-setup.exe"
          Start-Process -FilePath "innosetup-setup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
        shell: powershell

      - name: Build Installer with Inno Setup
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
              $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
              Write-Error "ISCC.exe not found on the runner!"
              exit 1
          }
          Write-Output "Located Inno Setup compiler at: $iscc"
          & "$iscc" QuantimeSetup.iss
        shell: powershell

      - name: Create Release & Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.ref_name }} --yes --cleanup-tag || true
          gh release create ${{ github.ref_name }} dist/QuantimeSetup.exe --title "Release ${{ github.ref_name }}" --notes "Automated release build for version ${{ github.ref_name }}"
        shell: bash
