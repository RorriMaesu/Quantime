name: Compile & Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Upload Installer
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Inno Setup
        run: |
          Invoke-WebRequest -Uri "http://files.jrsoftware.org/is/6/innosetup-6.3.3.exe" -OutFile "innosetup-setup.exe"
          Start-Process -FilePath "innosetup-setup.exe" -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait
        shell: powershell

      - name: Build Installer with Inno Setup
        run: |
          $iscc = (Get-ChildItem -Path "C:\Program Files*" -Filter "ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $iscc) {
              Write-Error "ISCC.exe not found on the runner!"
              exit 1
          }
          Write-Output "Located Inno Setup compiler at: $iscc"
          & $iscc QuantimeSetup.iss
        shell: powershell

      - name: Create Release & Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/QuantimeSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
