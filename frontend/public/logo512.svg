<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Core Brand Gradient -->
    <linearGradient id="glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Glowing Quantum Particle Gradient -->
    <radialGradient id="particle-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </radialGradient>
    
    <!-- Neon Drop Shadow Filter for depth -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.6" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep space dark background -->
  <rect width="512" height="512" rx="100" fill="#090a0f" />

  <g filter="url(#neon-glow)">
    <!-- The main Q loop with evenodd fill rule to hollow out the hourglass -->
    <path d="M 256 86
             A 170 170 0 1 0 256 426
             A 170 170 0 1 0 256 86 Z
             M 196 160
             C 226 210 236 240 236 256
             C 236 272 226 302 196 352
             H 316
             C 286 302 276 272 276 256
             C 276 240 286 210 316 160
             Z"
          fill="url(#glow)"
          fill-rule="evenodd" />

    <!-- Orbital Tail representing the sweep of Q and Quantum path -->
    <path d="M 180 370
             C 240 440 360 450 410 360"
          fill="none"
          stroke="url(#glow)"
          stroke-width="22"
          stroke-linecap="round" />

    <!-- Quantum Particle (AI Nucleus) at the tip of the Q tail -->
    <circle cx="410" cy="360" r="22" fill="url(#particle-grad)" />
  </g>
</svg>
