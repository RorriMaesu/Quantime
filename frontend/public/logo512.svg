<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6366f1" flood-opacity="0.4" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="#0b0c10" />
  <g filter="url(#shadow)">
    <!-- Outer Ring -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#glow)" stroke-width="12" stroke-dasharray="24 16" />
    <!-- Clock Hands/Hourglass -->
    <path d="M200 160 H312 L256 256 Z" fill="url(#glow)" opacity="0.8" />
    <path d="M200 352 H312 L256 256 Z" fill="url(#glow)" />
    <!-- Center Node -->
    <circle cx="256" cy="256" r="14" fill="#ffffff" />
  </g>
</svg>
