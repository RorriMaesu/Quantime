<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Core Brand Gradient -->
    <linearGradient id="glow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Glowing Quantum Particle Gradient -->
    <radialGradient id="particle-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </radialGradient>
    
    <!-- Neon Glow Filter for outer self-illumination -->
    <filter id="neon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Crossover Shadow to create true 3D overlap depth -->
    <filter id="crossover-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Deep space dark background -->
  <rect width="512" height="512" rx="100" fill="#090a0f" />

  <!-- Outer Neon Glow Group -->
  <g filter="url(#neon-glow)">
    
    <!-- LAYER 1: The Back Outer Ring -->
    <path d="M 256 90 A 166 166 0 1 0 256 422 A 166 166 0 1 0 256 90" 
          fill="none" 
          stroke="url(#glow)" 
          stroke-width="32" />

    <!-- LAYER 2: The Front Overlapping Ribbon (creates Hourglass and twist) -->
    <!-- The curves are carefully calculated to pinch organically at the center (256, 256) -->
    <g filter="url(#crossover-shadow)">
      <!-- Left side of the twist -->
      <path d="M 256 90 C 180 150 216 230 256 256 C 296 282 332 362 256 422" 
            fill="none" 
            stroke="url(#glow)" 
            stroke-width="32" 
            stroke-linecap="round" />
            
      <!-- Right side of the twist -->
      <path d="M 256 90 C 332 150 296 230 256 256 C 216 282 180 362 256 422" 
            fill="none" 
            stroke="url(#glow)" 
            stroke-width="32" 
            stroke-linecap="round" />
    </g>

    <!-- LAYER 3: Seamless Orbital Tail connecting at the bottom twist -->
    <path d="M 256 422 C 325 422 385 390 410 320" 
          fill="none" 
          stroke="url(#glow)" 
          stroke-width="20" 
          stroke-linecap="round" />

    <!-- LAYER 4: Quantum Particle (AI Nucleus) with glow -->
    <circle cx="410" cy="320" r="22" fill="url(#particle-grad)" />

  </g>
</svg>
